<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review</title>
    <meta name="author" content="Nweke Joshua">
    <meta name="description" content="A product review form page showing good design principles, meet specific field raand includes a submission confirmation with a counter.">
    <link rel="stylesheet" href="styles/form.css">
    <link rel="stylesheet" href="styles/form-large.css">
    <script src="scripts/form.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Miranda+Sans:ital,wght@0,400..700;1,400..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Titillium+Web:wght@200;300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Product Review</h1>
    </header>
    <main>
        <form action="review.html" method="get" class="prf">
            <label id="productname" name="product">Product name*
                <select id="productname" name="product" required>
                    <option value="" disabled selected>Select a Product</option>
                </select>
            </label>
            <div>Overall Ratting*</div>
            <div class="star-rating">
                <label id="onestar" name="rating">⭐<input type="radio" id="onestar" name="rating" value="1" required></label>
                <label>⭐⭐<input type="radio" id="twostar" name="rating" value="2" required></label>
                <label>⭐⭐⭐<input type="radio" id="threestar" name="rating" value="3" required></label>
                <label>⭐⭐⭐⭐<input type="radio" id="fourstar" name="rating" value="4" required></label>
                <label>⭐⭐⭐⭐⭐<input type="radio" id="fivestar" name="rating" value="5" required></label>
            </div>
           <label>Date of Installation* <input id="date" name="installationDate" type="date" required></label>
           <div class="features">Which features did you find useful in the product? <span>Check all that apply</span></div>
           <label><input type="checkbox" id="durability" name="durability" value="yes"> Durability</label>
           <label><input type="checkbox" id="use" name="use" value="yes"> Ease of Use</label>
           <label><input type="checkbox" id="performance" name="performance" value="yes"> Performance</label>
           <label><input type="checkbox" id="name" name="design" value="yes"> Design</label>
           <label>Written Review <span>(Optional)</span><textarea name="review" id="review" placeholder="Please write your review!"></textarea></label>
           <label>Your Name <span>(Optional)</span><input type="text" name="fullname"></label>

           <input type="submit" value="Post Review">
        </form>
    </main>
    <footer>
        <p>©️<strong class="currentyear"></strong> 🌺Nweke Joshua🌺 Nigeria</p>
        <p id="lastmodified"></p>
    </footer>
</body>
</html>
