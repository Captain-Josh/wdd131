<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTAH | Salt Lake City</title>
    <meta name="Author" content="Nweke Joshua">
    <meta name="description" content="UTAH Salt LAke City - A responsive page showcasing Utah's geography and weather, an inspiring place i hope to visit one day.">
    <link rel="stylesheet" href="styles/place.css">
    <link rel="stylesheet" href="styles/place-large.css">
    <script src="scripts/place.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Titillium+Web:wght@200;300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>UTAH | Salt Lake City</h1>
    </header>
    <main>
        <div class="main-content">
            
            <div class="image">
                <picture>
                <source srcset="images/hero-large.webp" media="(min-width: 1000px)">
                <source srcset="images/hero-medium.webp" media="(min-width: 600px)">
                <img src="images/hero-small.webp" alt="UTAH|Salt LAke City" width="600px" height="300px">
            </picture>
            </div>
            <section class="data">
                <h2>Data</h2>
                <p><label>Area:</label> <span>84,898 sq miles</span></p>
                <p><label>Population:</label> <span>3,503,613</span></p>
                <p><label>Capital:</label> <span>Salt Lake City</span></p>
                <p><label>Language:</label> <span>English</span></p>
                <p><label>Currency:</label> <span>USD</span></p>
                <p><label>Time Zone:</label> <span>MDT</span></p>
                <p><label>Calling Code:</label><span>+385</span></p>
                <p><label>Internet TLD:</label><span>.us</span></p>
            </section>
    
            <section class="weather">
                <h2>Weather</h2>
                <img id="weather" src="images/weather-icon.svg" alt="Weather inage">
                <p><label>Temperature: </label><span>8°C </span></p>
                <p><label>Conditions:</label><span>Sunny</span> </p>
                <p><label>Wind:</label><span> 8 km/h</span></p>
                <p><label>Wind Chill:</label><span id="wind-chill"></span></p>
            </section>
        </div>
    </main>
    <footer>
        <p id="copyright">©️<span id="currentyear"></span>🌺 Nweke Joshua 🌺 Nigeria🌺 UTAH</p>
        <p id="lastmodified"></p>

    </footer>
</body>
</html>
